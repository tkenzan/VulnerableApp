name: AI Security Audit
on: [push]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Gemini Scan
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          CODE_CONTENT=$(cat server.js 2>/dev/null || echo "No server.js found")
          curl -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}" \
          -H 'Content-Type: application/json' \
          -d "{
            \"contents\": [{
              \"parts\":[{\"text\": \"あなたはプロのセキュリティリサーチャーです。以下のコードの脆弱性を診断し、日本語で報告してください。 \n\n ${CODE_CONTENT}\"}]
            }]
          }"
