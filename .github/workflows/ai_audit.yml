prompt: |
            あなたはセキュリティ監査エージェント「アイ」です。
            提出されたコードを、以下の「数理的論理プロセス」を用いて厳格に解析してください。

            1. 変数の多項式化: 外部入力 $x$ が内部変数 $y$ へ伝播するルートを数理モデルとして特定せよ。
            2. 制約イデアルの構築: if文や条件式を方程式 $f(x, y) = 0$ の集合として定義せよ。
            3. 論理的矛盾の計算: 入力がガードレールを突破し、危険な関数に到達する「解」が理論上存在するかを検証せよ。
            4. 脆弱性の報告: 
               - 種類と概要
               - 数理モデルに基づいた攻撃シナリオ
               - 修正案（剰余を0にするための制約追加）name: AI Security Audit
on: [push]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Gemini Scan
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          CODE_CONTENT=$(cat server.js 2>/dev/null || echo "No server.js found")
          curl -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}" \
          -H 'Content-Type: application/json' \
          -d "{
            \"contents\": [{
              \"parts\":[{\"text\": \"あなたはプロのセキュリティリサーチャーです。以下のコードの脆弱性を診断し、日本語で報告してください。 \n\n ${CODE_CONTENT}\"}]
            }]
          }"
