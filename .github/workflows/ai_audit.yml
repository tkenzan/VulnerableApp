name: AI Security Audit
on: [push]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Gemini Security Scan
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          curl -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}" \
          -H 'Content-Type: application/json' \
          -d '{
            "contents": [{
              "parts":[{"text": "あなたはプロのセキュリティリサーチャーです。以下のファイルにSSRFやSQLインジェクションなどの脆弱性がないか監査し、具体的な修正案を日本語で提示してください。 \n\n $(cat server.js || echo 'No server.js found')"}]
            }]
          }'
