name: AI Security Audit (Eye & Kann)
on: [push]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Eye and Kann Scan
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          CODE=$(cat server.js 2>/dev/null || echo "No code found")
          
          # 1. アイの数理監査
          EYE_PROMPT="監査官アイ。以下を数理監査せよ。1.入力xと変数yをモデル化。2.if文を方程式化。3.ガードを抜けSinkに届く解を検証。4.攻撃入力を示せ。対象：\n$CODE"
          EYE_RES=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H 'Content-Type: application/json' \
            -d "{\"contents\": [{\"parts\":[{\"text\": \"$EYE_PROMPT\"}]}]}" | jq -r '.candidates[0].content.parts[0].text')
          
          echo "--- 監査官アイの報告 ---"
          echo "$EYE_RES"

          # 2. カンの反論（検証）
          KANN_PROMPT="検証官カン。アイの報告に対し、数理的な見落としや非自明な攻撃経路がないか徹底的に反論せよ。報告内容：\n$EYE_RES"
          KANN_RES=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H 'Content-Type: application/json' \
            -d "{\"contents\": [{\"parts\":[{\"text\": \"$KANN_PROMPT\"}]}]}" | jq -r '.candidates[0].content.parts[0].text')

          echo "--- 検証官カンの反論 ---"
          echo "$KANN_RES"
